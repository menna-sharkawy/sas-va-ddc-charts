<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alerts by Operator 3D - DDC Bar Chart</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: "Segoe UI", Arial, sans-serif;
    background: transparent;
    overflow: hidden;
  }
  #wrapper {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: 4px;
  }
  #chartArea {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
  }
  #barSvg { width: 100%; height: 100%; display: block; }
  #legend {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    padding-top: 4px;
    font-size: 11px;
    color: #333;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .legend-item.disabled { opacity: 0.35; }
  .swatch { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  .bar-seg { cursor: pointer; }
  #tooltip {
    position: fixed;
    display: none;
    pointer-events: none;
    background: rgba(30, 30, 45, 0.92);
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.5;
    white-space: nowrap;
    z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  #tooltip .tt-title { font-weight: 700; margin-bottom: 1px; }
  #tooltip .tt-swatch { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
</style>
</head>
<body>

<div id="wrapper">
  <div id="chartArea">
    <svg id="barSvg"></svg>
  </div>
  <div id="legend"></div>
</div>
<div id="tooltip"></div>

<script>
/* ===========================================================
   CONFIG
=========================================================== */
// "stacked"  -> segments stack into one pill-shaped bar per category (matches the dashboard screenshot)
// "grouped"  -> separate mini pill bars side-by-side per measure, per category
var BAR_MODE = "stacked";

// Colors assigned by measure POSITION — works automatically no matter the measure names.
var COLOR_PALETTE = ["#6366f1", "#f43f5e", "#10b981", "#f59e0b", "#8b5cf6", "#06b6d4"];

// Optional: force a specific measure name to a specific color regardless of position.
var MEASURE_COLOR_OVERRIDES = {
  // "Resolved": "#38bdf8",
  // "SLA Breaches": "#f43f5e"
};

var SHOW_TOTAL_LABEL = false; // number above each bar/stack

// Corner style: 0 = fully square edges. Increase for rounded/pill corners
// (e.g. barW/2 style rounding was used previously for a capsule look).
var CORNER_RADIUS = 0;

// How much of each category's allotted slot the bar fills (0-1).
// Higher = wider bars = narrower gaps between them.
var BAR_WIDTH_FRACTION = 0.68;
var BAR_MAX_WIDTH = 56;

// Sample/fallback data so this renders standalone in a browser too.
var sampleData = {
  categories: ["JD", "WS", "AS", "HQ", "TH", "IN"],
  series: [
    { name: "Resolved", values: [195, 199, 178, 189, 186, 154] },
    { name: "SLA Breaches", values: [95, 94, 64, 90, 89, 71] }
  ]
};

var lastCategories = null, lastSeries = null;

/* ===========================================================
   HELPERS
=========================================================== */
function colorFor(name, i) {
  return MEASURE_COLOR_OVERRIDES[name] || COLOR_PALETTE[i % COLOR_PALETTE.length];
}

function shadeColor(hex, percent) {
  var f = parseInt(hex.slice(1), 16),
      t = percent < 0 ? 0 : 255,
      p = percent < 0 ? -percent : percent,
      R = f >> 16, G = (f >> 8) & 0x00FF, B = f & 0x0000FF;
  return "#" + (0x1000000 +
    (Math.round((t - R) * p / 100) + R) * 0x10000 +
    (Math.round((t - G) * p / 100) + G) * 0x100 +
    (Math.round((t - B) * p / 100) + B)
  ).toString(16).slice(1);
}

// Generates clean, round-number axis ticks (like 0, 50, 100, 150...) instead
// of jagged fractions of the raw max value.
function niceTicks(maxValue, tickCount) {
  if (maxValue <= 0) return [0, 1];
  var rawStep = maxValue / tickCount;
  var mag = Math.pow(10, Math.floor(Math.log(rawStep) / Math.LN10));
  var norm = rawStep / mag;
  var niceNorm = norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10;
  var step = niceNorm * mag;
  var niceMax = Math.ceil(maxValue / step) * step;
  var ticks = [];
  for (var v = 0; v <= niceMax + 1e-9; v += step) ticks.push(Math.round(v * 100) / 100);
  return ticks;
}

/* ===========================================================
   MAIN RENDER
=========================================================== */
function renderBars(categories, series) {
  lastCategories = categories;
  lastSeries = series;

  var wrap = document.getElementById("chartArea");
  var W = wrap.clientWidth || 400;
  var H = wrap.clientHeight || 260;

  var svg = document.getElementById("barSvg");
  svg.setAttribute("viewBox", "0 0 " + W + " " + H);
  svg.setAttribute("width", W);
  svg.setAttribute("height", H);

  var topPad = 34, bottomPad = 24, leftPad = 40, rightPad = 20;
  var plotH = H - topPad - bottomPad;
  var plotW = W - leftPad - rightPad;
  var baselineY = H - bottomPad;

  var groupCount = categories.length;
  var groupW = plotW / groupCount;

  // Determine scale
  var maxVal = 0;
  if (BAR_MODE === "stacked") {
    categories.forEach(function (c, ci) {
      var total = series.reduce(function (s, ser) { return s + (ser.values[ci] || 0); }, 0);
      if (total > maxVal) maxVal = total;
    });
  } else {
    series.forEach(function (ser) {
      ser.values.forEach(function (v) { if (v > maxVal) maxVal = v; });
    });
  }
  if (maxVal <= 0) maxVal = 1;

  var yTicks = niceTicks(maxVal, 5);
  var niceMax = yTicks[yTicks.length - 1];
  var scale = plotH / niceMax;

  var defs = '<filter id="barBehindShadow" x="-60%" y="-60%" width="220%" height="220%">' +
                '<feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>' +
              '</filter>';
  var shadows = "";
  var bars = "";
  var labels = "";

  // Isometric extrusion offset — how far the "depth" of each box shifts up-right.
  var DX = 9, DY = -7;

  categories.forEach(function (cat, ci) {
    if (BAR_MODE === "stacked") {
      var barW = Math.min(BAR_MAX_WIDTH, groupW * BAR_WIDTH_FRACTION);
      var barX = leftPad + groupW * ci + (groupW - barW) / 2;
      var total = series.reduce(function (s, ser) { return s + (ser.values[ci] || 0); }, 0);
      var totalH = Math.max(total * scale, 2);
      var topY = baselineY - totalH;

      shadows += '<rect x="' + (barX - 3) + '" y="' + (topY - 3) + '" width="' + (barW + 6) + '" height="' + (totalH + 6) + '" fill="rgba(20,20,40,0.30)" filter="url(#barBehindShadow)"/>';

      // --- pass 1: side (right) faces, bottom to top ---
      var cursorY = baselineY;
      var segTops = []; // remember each segment's top y for the front-face pass
      series.forEach(function (ser, si) {
        var val = ser.values[ci] || 0;
        var segH = val * scale;
        var segTop = cursorY - segH;
        var color = colorFor(ser.name, si);
        var darkSide = shadeColor(color, -38);

        var sidePath = 'M' + (barX + barW) + ',' + cursorY +
          ' L' + (barX + barW) + ',' + segTop +
          ' L' + (barX + barW + DX) + ',' + (segTop + DY) +
          ' L' + (barX + barW + DX) + ',' + (cursorY + DY) + ' Z';
        bars += '<path d="' + sidePath + '" fill="' + darkSide + '"/>';

        segTops.push(segTop);
        cursorY = segTop;
      });

      // --- pass 2: front faces, bottom to top ---
      cursorY = baselineY;
      series.forEach(function (ser, si) {
        var val = ser.values[ci] || 0;
        var segH = val * scale;
        var segTop = cursorY - segH;
        var color = colorFor(ser.name, si);
        var light = shadeColor(color, 20);
        var gid = "segGrad" + ci + "_" + si;
        defs += '<linearGradient id="' + gid + '" x1="0%" y1="0%" x2="100%" y2="0%">' +
                  '<stop offset="0%" stop-color="' + light + '"/>' +
                  '<stop offset="100%" stop-color="' + color + '"/>' +
                '</linearGradient>';
        bars += '<rect class="bar-seg" data-cat="' + ci + '" data-series="' + si + '" x="' + barX + '" y="' + segTop + '" width="' + barW + '" height="' + (segH + 1) + '" fill="url(#' + gid + ')"/>';
        cursorY = segTop;
      });

      // --- pass 3: top face of the topmost segment only ---
      var lastSi = series.length - 1;
      var lastColor = colorFor(series[lastSi].name, lastSi);
      var topLight = shadeColor(lastColor, 32);
      var topPath = 'M' + barX + ',' + topY +
        ' L' + (barX + barW) + ',' + topY +
        ' L' + (barX + barW + DX) + ',' + (topY + DY) +
        ' L' + (barX + DX) + ',' + (topY + DY) + ' Z';
      bars += '<path class="bar-seg" data-cat="' + ci + '" data-series="' + lastSi + '" d="' + topPath + '" fill="' + topLight + '" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>';

      if (SHOW_TOTAL_LABEL) {
        labels += '<text x="' + (barX + barW / 2 + DX / 2) + '" y="' + (topY + DY - 8) + '" text-anchor="middle" font-size="12" font-weight="700" fill="#333">' + total.toLocaleString() + "</text>";
      }
    } else {
      // grouped mode: mini 3D boxes side by side
      var n = series.length;
      var miniGap = 4 + DX;
      var miniW = Math.min(18, (groupW - miniGap * (n - 1)) / n * 0.8);
      var totalGroupW = miniW * n + miniGap * (n - 1);
      var startX = leftPad + groupW * ci + (groupW - totalGroupW) / 2;

      series.forEach(function (ser, si) {
        var val = ser.values[ci] || 0;
        var segH = Math.max(val * scale, 2);
        var barX = startX + si * (miniW + miniGap);
        var topY = baselineY - segH;
        var color = colorFor(ser.name, si);
        var light = shadeColor(color, 20);
        var darkSide = shadeColor(color, -38);
        var topLight = shadeColor(color, 32);
        var gid = "grpGrad" + ci + "_" + si;

        defs += '<linearGradient id="' + gid + '" x1="0%" y1="0%" x2="100%" y2="0%">' +
                  '<stop offset="0%" stop-color="' + light + '"/>' +
                  '<stop offset="100%" stop-color="' + color + '"/>' +
                '</linearGradient>';

        shadows += '<rect x="' + (barX - 2) + '" y="' + (topY - 2) + '" width="' + (miniW + 4) + '" height="' + (segH + 4) + '" fill="rgba(20,20,40,0.30)" filter="url(#barBehindShadow)"/>';

        var sidePath = 'M' + (barX + miniW) + ',' + baselineY +
          ' L' + (barX + miniW) + ',' + topY +
          ' L' + (barX + miniW + DX) + ',' + (topY + DY) +
          ' L' + (barX + miniW + DX) + ',' + (baselineY + DY) + ' Z';
        bars += '<path d="' + sidePath + '" fill="' + darkSide + '"/>';

        bars += '<rect class="bar-seg" data-cat="' + ci + '" data-series="' + si + '" x="' + barX + '" y="' + topY + '" width="' + miniW + '" height="' + segH + '" fill="url(#' + gid + ')"/>';

        var topPath = 'M' + barX + ',' + topY +
          ' L' + (barX + miniW) + ',' + topY +
          ' L' + (barX + miniW + DX) + ',' + (topY + DY) +
          ' L' + (barX + DX) + ',' + (topY + DY) + ' Z';
        bars += '<path class="bar-seg" data-cat="' + ci + '" data-series="' + si + '" d="' + topPath + '" fill="' + topLight + '" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>';

        if (SHOW_TOTAL_LABEL) {
          labels += '<text x="' + (barX + miniW / 2 + DX / 2) + '" y="' + (topY + DY - 6) + '" text-anchor="middle" font-size="10" font-weight="700" fill="#333">' + val.toLocaleString() + "</text>";
        }
      });
    }

    // category label
    labels += '<text x="' + (leftPad + groupW * ci + groupW / 2) + '" y="' + (baselineY + 16) + '" text-anchor="middle" font-size="11" fill="#666">' + cat + "</text>";
  });

  var baseline = '<line x1="' + leftPad + '" y1="' + baselineY + '" x2="' + (W - rightPad) + '" y2="' + baselineY + '" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>';

  // Y axis: vertical line, gridlines, and value labels
  var yAxis = '<line x1="' + leftPad + '" y1="' + topPad + '" x2="' + leftPad + '" y2="' + baselineY + '" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>';
  var gridlines = "";
  yTicks.forEach(function (t) {
    var ty = baselineY - t * scale;
    if (t > 0) {
      gridlines += '<line x1="' + leftPad + '" y1="' + ty + '" x2="' + (W - rightPad) + '" y2="' + ty + '" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>';
    }
    gridlines += '<text x="' + (leftPad - 8) + '" y="' + (ty + 3) + '" text-anchor="end" font-size="10" fill="#888">' + t.toLocaleString() + "</text>";
  });

  svg.innerHTML = "<defs>" + defs + "</defs>" + gridlines + shadows + bars + baseline + yAxis + labels;

  // hover + click wiring
  Array.prototype.forEach.call(svg.querySelectorAll(".bar-seg"), function (el) {
    el.addEventListener("mouseenter", function () {
      showTooltip(parseInt(this.getAttribute("data-cat"), 10), parseInt(this.getAttribute("data-series"), 10));
    });
    el.addEventListener("mousemove", moveTooltip);
    el.addEventListener("mouseleave", hideTooltip);
    el.addEventListener("click", function () {
      sendSelectionToVA(parseInt(this.getAttribute("data-cat"), 10));
    });
  });

  renderLegend(series);
}

/* ===========================================================
   TOOLTIP
=========================================================== */
function showTooltip(catIdx, seriesIdx) {
  if (!lastCategories || !lastSeries) return;
  var cat = lastCategories[catIdx];
  var ser = lastSeries[seriesIdx];
  var val = ser.values[catIdx] || 0;
  var color = colorFor(ser.name, seriesIdx);

  var html = '<div class="tt-title"><span class="tt-swatch" style="background:' + color + '"></span>' + cat + " — " + ser.name + "</div>" +
             "<div>" + val.toLocaleString() + "</div>";

  if (BAR_MODE === "stacked" && lastSeries.length > 1) {
    var total = lastSeries.reduce(function (s, se) { return s + (se.values[catIdx] || 0); }, 0);
    html += '<div style="color:#bbb">Total: ' + total.toLocaleString() + "</div>";
  }

  var tip = document.getElementById("tooltip");
  tip.innerHTML = html;
  tip.style.display = "block";
}

function moveTooltip(evt) {
  var tip = document.getElementById("tooltip");
  var offset = 14;
  var x = evt.clientX + offset;
  var y = evt.clientY + offset;
  var maxX = window.innerWidth - tip.offsetWidth - 8;
  var maxY = window.innerHeight - tip.offsetHeight - 8;
  if (x > maxX) x = evt.clientX - tip.offsetWidth - offset;
  if (y > maxY) y = evt.clientY - tip.offsetHeight - offset;
  tip.style.left = x + "px";
  tip.style.top = y + "px";
}

function hideTooltip() {
  document.getElementById("tooltip").style.display = "none";
}

/* ===========================================================
   LEGEND
=========================================================== */
function renderLegend(series) {
  var el = document.getElementById("legend");
  el.innerHTML = "";
  series.forEach(function (s, i) {
    var color = colorFor(s.name, i);
    var item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = '<span class="swatch" style="background:' + color + '"></span><span>' + s.name + "</span>";
    item.addEventListener("click", function () {
      // simple visual toggle; full hide/show would need a re-render with filtered series
      item.classList.toggle("disabled");
    });
    el.appendChild(item);
  });
}

/* ===========================================================
   SAS Visual Analytics Data-Driven Content messaging
=========================================================== */
function handleVAMessage(event) {
  var msg = event.data;
  if (!msg || typeof msg !== "object" || !msg.data || !msg.columns) return;

  try {
    // Column roles, in the order VA sends them: Category (x) -> string,
    // Group (stack split) -> string, Measure (y) -> number.
    var stringCols = [];
    var measureColIdx = -1;
    var measureName = "Value";

    msg.columns.forEach(function (col, i) {
      if (col.type === "string") {
        stringCols.push(i);
      } else if (col.type === "number" && measureColIdx === -1) {
        measureColIdx = i;
        measureName = col.label || col.name || "Value";
      }
    });

    if (stringCols.length === 0 || measureColIdx === -1) return;

    var catColIdx = stringCols[0];
    var groupColIdx = stringCols.length > 1 ? stringCols[1] : -1;

    // Pivot long-format rows (one row per category+group) into
    // wide-format series (one array of values per group, aligned to categories).
    var categories = [];
    var catIndex = {};
    var groups = [];
    var groupIndex = {};
    var valueMap = {};

    msg.data.forEach(function (row) {
      var cat = String(row[catColIdx]);
      var grp = groupColIdx > -1 ? String(row[groupColIdx]) : measureName;
      var val = Number(row[measureColIdx]) || 0;

      if (!(cat in catIndex)) { catIndex[cat] = categories.length; categories.push(cat); }
      if (!(grp in groupIndex)) { groupIndex[grp] = groups.length; groups.push(grp); }

      var key = catIndex[cat] + "_" + groupIndex[grp];
      valueMap[key] = (valueMap[key] || 0) + val;
    });

    var series = groups.map(function (grp, gi) {
      return {
        name: grp,
        values: categories.map(function (cat, ci) {
          return valueMap[ci + "_" + gi] || 0;
        })
      };
    });

    renderBars(categories, series);
  } catch (e) {
    console.error("Error parsing VA message:", e);
  }
}

function sendSelectionToVA(rowIndex) {
  if (window.parent === window) return;
  window.parent.postMessage({
    version: "1.0",
    resultName: window.__resultName || "barDDC3D",
    selections: [{ row: rowIndex }]
  }, "*");
}

window.addEventListener("message", handleVAMessage);
window.addEventListener("resize", function () {
  if (lastCategories && lastSeries) renderBars(lastCategories, lastSeries);
});

/* Initial render with sample data (works standalone in a browser too) */
renderBars(sampleData.categories, sampleData.series);
</script>

</body>
</html>
